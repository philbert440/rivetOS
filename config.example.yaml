# RivetOS Configuration
# Copy to ~/.rivetos/config.yaml and fill in your values.
# API keys via env vars — never in this file.

runtime:
  workspace: ~/.rivetos/workspace
  default_agent: opus
  turn_timeout: 900

agents:
  opus:
    provider: anthropic
    default_thinking: medium

providers:
  anthropic:
    model: claude-opus-4-7
    max_tokens: 8192
    # api_key via env: ANTHROPIC_API_KEY

  # --- Local models: vLLM (full surface) or llama.cpp llama-server ---
  # vllm:                                   # or "llama-server" for llama.cpp
  #   name: 'Local (vLLM)'
  #   base_url: http://localhost:8000       # or http://localhost:8000/v1
  #   api_key: sk-no-key-required           # or ${VLLM_API_KEY}
  #   model: qwen3.6-35b-a3b-awq
  #   temperature: 0.7
  #   top_p: 0.9
  #   max_tokens: 8192
  #   context_window: 65536
  #   max_output_tokens: 8192
  #   # default_tool_choice: auto           # auto | none | required
  #   # verify_model_on_init: true          # probe /v1/models at boot

channels:
  discord:
    # bot_token via env: DISCORD_BOT_TOKEN
    owner_id: ""
    channel_bindings: {}

# ---------------------------------------------------------------------------
# Plugins — npm package names of rivetos plugins to load.
#
# Required in production deployments (flat install): boot will fail-fast if
# any listed plugin is not resolvable.
#
# Optional in workspace mode (running from a source checkout): when omitted,
# boot scans `plugins/<category>/*` and `node_modules/*` for any package
# whose `package.json` declares a `rivetos` block. When present, the explicit
# list is union'd with workspace scans — useful for testing prod-shape config
# from a checkout.
# ---------------------------------------------------------------------------
# plugins:
#   - "@rivetos/provider-anthropic"
#   - "@rivetos/provider-claude-cli"
#   - "@rivetos/provider-google"
#   - "@rivetos/provider-xai"
#   - "@rivetos/provider-ollama"
#   - "@rivetos/provider-vllm"
#   - "@rivetos/provider-llama-server"
#   - "@rivetos/channel-telegram"
#   - "@rivetos/channel-discord"
#   - "@rivetos/channel-voice-discord"
#   - "@rivetos/tool-shell"
#   - "@rivetos/tool-file"
#   - "@rivetos/tool-search"
#   - "@rivetos/tool-interaction"
#   - "@rivetos/tool-web-search"
#   - "@rivetos/tool-mcp-client"
#   - "@rivetos/memory-postgres"
#   - "@rivetos/mcp-server"

memory:
  postgres:
    # connection_string via env: RIVETOS_PG_URL
    #
    # Embedding and compaction are handled by the unified rivetos image
    # running with --role worker (see infra/docker/rivetos/docker-compose.yml).
    #
    # Optional: persist delegation events into memory
    # delegation_tracking: true

# ---------------------------------------------------------------------------
# rivet-den (optional) — per-node agent activity diorama (docs/DEN.md).
# When enabled, `rivetos update` deploys/refreshes rivet-den.service on this
# node and GENERATES ~/.rivetos/den.env from this section, and the runtime's
# mesh registration advertises the den (capability + metadata.denPort) so
# viewers discover it via /mesh.json.
# ---------------------------------------------------------------------------
# den:
#   enabled: true
#   host: 0.0.0.0            # default 127.0.0.1 (loopback fail-safe)
#   port: 5174               # default
#   token: change-me         # REQUIRED when terminal.enabled and host isn't loopback
#   terminal:
#     enabled: false         # local PTY terminals — a deliberate opt-in
#     open: false            # true = explicitly allow tokenless terminals on a
#                            # trusted private network (anything that can reach
#                            # the port can spawn a shell as the service user)
#   # static_dir: /opt/rivetos/apps/den/dist            # defaults derived
#   # packs_dir: /opt/rivetos/packages/den-packs/packs  # from install root

# ---------------------------------------------------------------------------
# Deployment (optional) — uncomment to enable containerized deployment.
# If omitted, RivetOS runs bare-metal (just: rivetos start).
# ---------------------------------------------------------------------------
# deployment:
#   target: docker                      # docker | proxmox | kubernetes | manual
#
#   datahub:
#     postgres: true
#     shared_storage: true
#     shared_mount_path: /rivet-shared
#
#   image:
#     build_from_source: true           # Build from local source tree (default)
#     # registry: ghcr.io/philbert440   # For pre-built images
#     # tag: latest
#
#   # Docker-specific (when target: docker)
#   docker:
#     network: rivetos-net
#     postgres_port: 5432
#
#   # Proxmox-specific (when target: proxmox)
#   # proxmox:
#   #   api_url: https://192.168.1.1:8006
#   #   nodes:
#   #     - name: pve1
#   #       host: 192.168.1.1
#   #       role: datahub
#   #     - name: pve2
#   #       host: 192.168.1.2
#   #       role: agents
#   #   network:
#   #     bridge: vmbr1
#   #     subnet: 192.168.1.0/24
#   #     gateway: 192.168.1.1

# Durable task engine (phase 1) — embedded run-task runner over ros_tasks.
# Inert until something creates tasks; requires Postgres + the 0002 migration
# (rivetos-memory-migrate). Disable to skip starting the runner entirely.
# tasks:
#   enabled: true
