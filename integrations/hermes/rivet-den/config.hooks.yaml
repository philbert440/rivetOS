# rivet-den hooks for Hermes — merge this `hooks:` block into ~/.hermes/config.yaml
# on a node that runs Hermes (the local nodes). Maps Hermes lifecycle events to
# the rivet-den protocol so a Hermes conversation streams into RivetHub chat /
# the den, exactly like Claude Code and grok Build.
#
# The hook script is installed at ~/.hermes/agent-hooks/hermes-den-hook.mjs
# (copy of integrations/hermes/rivet-den/hooks/hermes-den-hook.mjs). It reads
# the event payload on stdin and reports into the den room named by
# RIVET_DEN_SESSION (injected by the den-server PTY spawner).
#
# NOTE: Hermes splits the command into argv WITHOUT shell expansion, so `$HOME`
# would reach node literally — every command is wrapped in `sh -c` so the shell
# expands it (keeps the block portable across users: /home/rivet, /home/philip).
#
# Event names + the assistant_response field are from the Hermes docs
# (hermes-agent.nousresearch.com/docs/user-guide/features/hooks): the reply is
# on post_llm_call.assistant_response, so no transcript parsing is needed.

hooks:
  on_session_start:
    - command: "sh -c 'node $HOME/.hermes/agent-hooks/hermes-den-hook.mjs on_session_start'"
      timeout: 5
  pre_llm_call:
    - command: "sh -c 'node $HOME/.hermes/agent-hooks/hermes-den-hook.mjs pre_llm_call'"
      timeout: 5
  pre_tool_call:
    - matcher: '.*'
      command: "sh -c 'node $HOME/.hermes/agent-hooks/hermes-den-hook.mjs pre_tool_call'"
      timeout: 5
  post_tool_call:
    - matcher: '.*'
      command: "sh -c 'node $HOME/.hermes/agent-hooks/hermes-den-hook.mjs post_tool_call'"
      timeout: 5
  post_llm_call:
    - command: "sh -c 'node $HOME/.hermes/agent-hooks/hermes-den-hook.mjs post_llm_call'"
      timeout: 5
  on_session_end:
    - command: "sh -c 'node $HOME/.hermes/agent-hooks/hermes-den-hook.mjs on_session_end'"
      timeout: 5
