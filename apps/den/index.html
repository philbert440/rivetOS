<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>rivet-den</title>
  <style>
    /* --ui is set by the WindowManager's layout() so the HTML widgets scale
       with the canvas frames instead of staying fixed-px on every screen */
    :root { --ui: 1; }
    html, body { margin: 0; padding: 0; background: #1b2230; height: 100%; overflow: hidden; }
    #stage { position: fixed; inset: 0; }
    /* mic-live pill shown while the push-to-talk hotkey is held */
    #ptt-live {
      position: fixed; bottom: calc(16px * var(--ui)); left: 50%; transform: translateX(-50%);
      display: none; color: #0e1622; background: #34d399; box-shadow: 0 0 24px #34d39988;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(6px * var(--ui)) calc(14px * var(--ui)); border-radius: 999px;
      z-index: 10; user-select: none; -webkit-user-select: none;
    }
    #ptt-live.active { display: block; }
    /* Per-window chrome (title, activity subtitle, LED, ✕) is Pixi now —
       drawn by room.ts inside each window's title bar. */
    /* mobile tab strip: one visible window at a time — tap a tab to switch */
    #tab-strip {
      position: fixed; top: 0; left: 0; right: calc(120px * var(--ui)); z-index: 20;
      display: none; gap: 6px; padding: calc(6px * var(--ui)) calc(8px * var(--ui));
      overflow-x: auto; scrollbar-width: none;
    }
    #tab-strip.show { display: flex; }
    #tab-strip button {
      flex: 0 0 auto; background: #1a2534; color: #9fb3c8; border: 1px solid #3a4a5e;
      font: 700 calc(11px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(4px * var(--ui)) calc(10px * var(--ui)); border-radius: 6px;
      cursor: pointer; white-space: nowrap;
    }
    #tab-strip button.sel { color: #34d399; border-color: #34d399; }
    /* global header strip, top right: [+ NEW ▾][⚙]. + NEW only renders when
       den-server has terminals enabled (see header.ts) */
    #header-strip {
      position: fixed; top: calc(8px * var(--ui)); right: calc(8px * var(--ui)); z-index: 21;
      display: flex; gap: calc(6px * var(--ui)); align-items: flex-start;
    }
    /* wider strip when + NEW is visible → push the mobile tab strip over */
    body.term-on #tab-strip { right: calc(230px * var(--ui)); }
    #gear {
      background: #e8ebef; color: #30394a; border: 2px solid #8b93a1;
      font: 700 calc(16px * var(--ui)) 'Courier New', monospace;
      width: calc(34px * var(--ui)); height: calc(34px * var(--ui));
      border-radius: 8px; cursor: pointer; line-height: 1;
    }
    #gear.on { color: #34d399; border-color: #34d399; }
    #mesh-btn {
      background: #e8ebef; color: #30394a; border: 2px solid #8b93a1;
      font: 700 calc(13px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      height: calc(34px * var(--ui)); padding: 0 calc(10px * var(--ui));
      border-radius: 8px; cursor: pointer; line-height: 1;
    }
    #mesh-btn:hover { color: #2f9e63; border-color: #2f9e63; }
    #new-wrap { position: relative; display: none; }
    #new-wrap.on { display: flex; }
    #new-wrap > button {
      background: #e8ebef; color: #30394a; border: 2px solid #8b93a1;
      font: 700 calc(13px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      height: calc(34px * var(--ui)); cursor: pointer; line-height: 1;
    }
    #new-session { border-radius: 8px 0 0 8px; padding: 0 calc(10px * var(--ui)); }
    #new-menu-btn { border-radius: 0 8px 8px 0; border-left: none; padding: 0 calc(7px * var(--ui)); }
    #new-session:hover, #new-menu-btn:hover { color: #2f9e63; border-color: #2f9e63; }
    #new-menu {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 21;
      display: none; flex-direction: column; gap: 6px;
      background: #0e1622ee; border: 2px solid #3a4a5e; border-radius: 8px;
      padding: calc(8px * var(--ui));
    }
    #new-menu.open { display: flex; }
    #new-menu button {
      background: #1a2534; color: #9fb3c8; border: 1px solid #3a4a5e;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(7px * var(--ui)) calc(12px * var(--ui)); border-radius: 6px;
      cursor: pointer; text-align: left; white-space: nowrap;
    }
    #new-menu button:hover { color: #34d399; border-color: #34d399; }
    /* wake affordance on the sleeping idle window (term-enabled servers) */
    .wake-chip {
      position: fixed; z-index: 10; transform: translate(-50%, -50%);
      background: #0e1622cc; color: #6ee7a8; border: 1px solid #2f9e63;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(6px * var(--ui)) calc(12px * var(--ui)); border-radius: 999px;
      cursor: pointer; white-space: nowrap;
    }
    .wake-chip:hover { color: #0e1622; background: #34d399; }
    /* per-window terminal drawer: window CHROME (frame bezel styling), not
       room scene — pinned over the room recess by a DomAnchor (drawer.ts) */
    .term-drawer {
      position: fixed; z-index: 9; box-sizing: border-box;
      background: #b7bec9; border: 2px solid #8b93a1;
      border-radius: 4px 4px 10px 10px; padding: 6px;
      box-shadow: 0 12px 28px #0009;
    }
    .term-drawer-well {
      width: 100%; height: 100%; box-sizing: border-box; overflow: hidden;
      background: #30394a; border-radius: 5px; padding: 5px;
    }
    .term-drawer .xterm { height: 100%; }
    #gear-menu {
      position: fixed; top: calc(48px * var(--ui)); right: calc(8px * var(--ui)); z-index: 21;
      display: none; flex-direction: column; gap: 6px;
      background: #0e1622ee; border: 2px solid #3a4a5e; border-radius: 8px;
      padding: calc(8px * var(--ui));
    }
    #gear-menu.open { display: flex; }
    #gear-menu button {
      background: #1a2534; color: #9fb3c8; border: 1px solid #3a4a5e;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(7px * var(--ui)) calc(12px * var(--ui)); border-radius: 6px;
      cursor: pointer; text-align: left; white-space: nowrap;
    }
    #gear-menu button.on, #gear-menu button.arming { color: #34d399; border-color: #34d399; }
    #edit-panel {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 15;
      background: #0e1622ee; border-top: 2px solid #3a4a5e;
      padding: 8px 12px; display: none; color: #9fb3c8;
      font: 12px 'Courier New', monospace;
    }
    #edit-panel.on { display: block; }
    #edit-chips { margin-bottom: 6px; }
    #edit-chips button {
      background: #1a2534; color: #9fb3c8; border: 1px solid #3a4a5e;
      font: 11px 'Courier New', monospace; padding: 4px 10px; margin-right: 6px;
      border-radius: 6px; cursor: pointer;
    }
    #edit-chips button.sel { color: #34d399; border-color: #34d399; }
    #edit-thumbs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; }
    #edit-thumbs img {
      height: 72px; border: 2px solid #3a4a5e; border-radius: 6px;
      cursor: pointer; background: #222; image-rendering: pixelated;
    }
    #edit-thumbs img.sel { border-color: #34d399; }
    #edit-hint { color: #5a6675; margin-top: 4px; }
    /* mesh overview route (/mesh — mesh.ts): node cards over the page bg */
    .mesh-page {
      position: fixed; inset: 0; overflow-y: auto; z-index: 5;
      padding: 24px; box-sizing: border-box;
      color: #9fb3c8; font: 12px 'Courier New', monospace;
    }
    .mesh-bar { display: flex; align-items: baseline; gap: 16px; margin-bottom: 18px; }
    .mesh-back {
      color: #9fb3c8; text-decoration: none; border: 1px solid #3a4a5e;
      border-radius: 6px; padding: 5px 12px; font-weight: 700; letter-spacing: 1px;
      background: #1a2534;
    }
    .mesh-back:hover { color: #34d399; border-color: #34d399; }
    .mesh-title { color: #e8ebef; font-size: 16px; font-weight: 700; letter-spacing: 3px; }
    .mesh-status { color: #5a6675; }
    .mesh-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px;
    }
    .mesh-card {
      display: block; background: #0e1622ee; border: 2px solid #3a4a5e; border-radius: 8px;
      padding: 14px 16px; color: inherit; text-decoration: none;
    }
    .mesh-card:hover { border-color: #34d399; }
    .mesh-card.off { opacity: 0.55; }
    .mesh-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .mesh-led { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
    .mesh-name {
      color: #e8ebef; font-size: 14px; font-weight: 700; letter-spacing: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mesh-host { color: #5a6675; margin-bottom: 8px; overflow-wrap: anywhere; }
    .mesh-count { font-weight: 700; letter-spacing: 1px; }
    .mesh-card.off .mesh-count { color: #5a6675; }
    .mesh-latest { border-top: 1px solid #3a4a5e; margin-top: 10px; padding-top: 8px; }
    .mesh-latest-title {
      color: #e8ebef; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mesh-latest-act { color: #5a6675; margin-top: 3px; }
    .mesh-msg { grid-column: 1 / -1; color: #5a6675; padding: 32px 8px; text-align: center; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="ptt-live">● MIC LIVE</div>
  <div id="tab-strip"></div>
  <div id="header-strip">
    <div id="new-wrap">
      <button id="new-session" title="new session (server default harness)">+ NEW</button>
      <button id="new-menu-btn" title="pick a harness">▾</button>
      <div id="new-menu"></div>
    </div>
    <button id="mesh-btn" title="mesh overview">MESH</button>
    <button id="gear" title="settings">⚙</button>
  </div>
  <div id="gear-menu">
    <button id="edit-btn">EDIT ROOM</button>
    <button id="ptt-key">TALK KEY: SPACE</button>
  </div>
  <div id="edit-panel">
    <div id="edit-chips"></div>
    <div id="edit-thumbs"></div>
    <div id="edit-hint">drag to move · scroll to resize · click a thumbnail to swap art · EXPORT downloads layout.json</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
