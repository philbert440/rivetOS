<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>rivet-den</title>
  <style>
    /* --ui is set by layout() in main.ts so the HTML widgets scale with the
       canvas frame instead of staying fixed-px on every screen size */
    :root { --ui: 1; }
    html, body { margin: 0; padding: 0; background: #1b2230; height: 100%; overflow: hidden; }
    #stage { position: fixed; inset: 0; }
    /* mic-live pill shown while the push-to-talk hotkey is held */
    #ptt-live {
      position: fixed; bottom: calc(16px * var(--ui)); left: 50%; transform: translateX(-50%);
      display: none; color: #0e1622; background: #34d399; box-shadow: 0 0 24px #34d39988;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(6px * var(--ui)) calc(14px * var(--ui)); border-radius: 999px;
      z-index: 10; user-select: none; -webkit-user-select: none;
    }
    #ptt-live.active { display: block; }
    /* The RPG narration log lives inside the room canvas now (see the chat
       panel in main.ts) — no HTML overlay for it anymore. */
    /* session picker + gear are docked ONTO the den window's title bar —
       left/top are set per-frame by positionChrome() in main.ts */
    #session-picker {
      position: fixed; transform: translateY(-50%); z-index: 20;
      background: #e8ebef; color: #30394a; border: 2px solid #8b93a1;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace;
      padding: calc(4px * var(--ui)) calc(8px * var(--ui)); border-radius: 8px; cursor: pointer;
    }
    /* ✕ next to the picker: clears the selected (stale) session */
    #session-x {
      position: fixed; transform: translateY(-50%); z-index: 20;
      background: #e8ebef; color: #8b5a5a; border: 2px solid #8b93a1;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace;
      width: calc(26px * var(--ui)); height: calc(26px * var(--ui));
      border-radius: 6px; cursor: pointer; line-height: 1;
    }
    /* gear button + dropdown: EDIT toggle and push-to-talk key binding live
       here — pinned to the right end of the title bar */
    #gear {
      position: fixed; transform: translate(-100%, -50%); z-index: 21;
      background: #e8ebef; color: #30394a; border: 2px solid #8b93a1;
      font: 700 calc(16px * var(--ui)) 'Courier New', monospace;
      width: calc(34px * var(--ui)); height: calc(34px * var(--ui));
      border-radius: 8px; cursor: pointer; line-height: 1;
    }
    #gear.on { color: #34d399; border-color: #34d399; }
    #gear-menu {
      position: fixed; transform: translateX(-100%); z-index: 21;
      display: none; flex-direction: column; gap: 6px;
      background: #0e1622ee; border: 2px solid #3a4a5e; border-radius: 8px;
      padding: calc(8px * var(--ui));
    }
    #gear-menu.open { display: flex; }
    #gear-menu button {
      background: #1a2534; color: #9fb3c8; border: 1px solid #3a4a5e;
      font: 700 calc(12px * var(--ui)) 'Courier New', monospace; letter-spacing: 1px;
      padding: calc(7px * var(--ui)) calc(12px * var(--ui)); border-radius: 6px;
      cursor: pointer; text-align: left; white-space: nowrap;
    }
    #gear-menu button.on, #gear-menu button.arming { color: #34d399; border-color: #34d399; }
    #edit-panel {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 15;
      background: #0e1622ee; border-top: 2px solid #3a4a5e;
      padding: 8px 12px; display: none; color: #9fb3c8;
      font: 12px 'Courier New', monospace;
    }
    #edit-panel.on { display: block; }
    #edit-chips { margin-bottom: 6px; }
    #edit-chips button {
      background: #1a2534; color: #9fb3c8; border: 1px solid #3a4a5e;
      font: 11px 'Courier New', monospace; padding: 4px 10px; margin-right: 6px;
      border-radius: 6px; cursor: pointer;
    }
    #edit-chips button.sel { color: #34d399; border-color: #34d399; }
    #edit-thumbs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; }
    #edit-thumbs img {
      height: 72px; border: 2px solid #3a4a5e; border-radius: 6px;
      cursor: pointer; background: #222; image-rendering: pixelated;
    }
    #edit-thumbs img.sel { border-color: #34d399; }
    #edit-hint { color: #5a6675; margin-top: 4px; }
    #caption {
      /* sits just above the bottom edge (mic pill overlays it when live) */
      position: fixed; bottom: calc(48px * var(--ui)); left: 50%; transform: translateX(-50%);
      color: #9fb3c8; font: calc(12px * var(--ui)) 'Courier New', monospace; z-index: 10;
      background: #0e1622cc; padding: 4px 10px; border-radius: 6px; white-space: nowrap;
      max-width: 92vw; overflow: hidden; text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="caption"></div>
  <div id="ptt-live">● MIC LIVE</div>
  <select id="session-picker" style="display:none"></select>
  <button id="session-x" style="display:none" title="remove this session from the den">✕</button>
  <button id="gear" title="settings">⚙</button>
  <div id="gear-menu">
    <button id="edit-btn">EDIT ROOM</button>
    <button id="ptt-key">TALK KEY: SPACE</button>
  </div>
  <div id="edit-panel">
    <div id="edit-chips"></div>
    <div id="edit-thumbs"></div>
    <div id="edit-hint">drag to move · scroll to resize · click a thumbnail to swap art · EXPORT downloads layout.json</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
