runtime:
  workspace: ~/.rivetos/workspace
  default_agent: %%AGENT_NAME%%
  turn_timeout: 900
  skill_dirs:
    - /opt/rivetos/skills
  heartbeats:
    - agent: %%AGENT_NAME%%
      schedule: '0 8,20 * * *'
      timezone: America/New_York
      prompt: >-
        Read HEARTBEAT.md if it exists (workspace context). Follow it strictly.
        Do not infer or repeat old tasks from prior chats. If nothing needs attention,
        reply HEARTBEAT_OK.
  fallbacks:
    - providerId: xai
      fallbacks:
        - "xai:grok-4-1-fast-reasoning"
      triggerCodes: [429, 503]
      triggerOnTimeout: true
agents:
  %%AGENT_NAME%%:
    provider: xai
    default_thinking: medium
providers:
  xai:
    model: %%DEFAULT_MODEL%%
    max_tokens: 8192
    available_models:
      - %%DEFAULT_MODEL%%
      - grok-4-1-fast-reasoning
channels:
  telegram:
    owner_id: '8093148723'
    bot_token: ${%%TELEGRAM_TOKEN_VAR%%}
    allowed_users:
      - '8093148723'
  discord:
    owner_id: '254134661196939264'
    allowed_guilds:
      - '1090284486945681430'
    channel_bindings:
      '1474965558851145793': grok
memory:
  postgres:
    connection_string: ${RIVETOS_PG_URL}
    embed_endpoint: ${RIVETOS_EMBED_URL}
    compactor_endpoint: https://api.x.ai/v1
    compactor_model: grok-4-1-fast-reasoning
    compactor_api_key: ${XAI_API_KEY}
