name: hermes-rivet-memory-tests

# Auxiliary CI for the Python Hermes memory provider plugin under
# integrations/hermes/rivet-memory/. Runs separately from the main `ci` job
# (Nx / TypeScript) so the TS pipeline doesn't pull a Python interpreter for
# every PR. Triggers only when plugin files or this workflow change.
#
# test_round_trip.py self-skips when RIVETOS_PG_URL is unset (module-level
# pytest.skip), so CI doesn't need access to a live datahub.

on:
  push:
    branches: [main]
    paths:
      - 'integrations/hermes/rivet-memory/**'
      - '.github/workflows/hermes-rivet-memory.yml'
  pull_request:
    paths:
      - 'integrations/hermes/rivet-memory/**'
      - '.github/workflows/hermes-rivet-memory.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: integrations/hermes/rivet-memory/requirements.txt

      - name: Install dependencies
        working-directory: integrations/hermes/rivet-memory
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run pytest
        working-directory: integrations/hermes/rivet-memory
        env:
          PYTHONUNBUFFERED: '1'
          # RIVETOS_PG_URL intentionally unset → test_round_trip.py skips.
        run: pytest tests/ -v
