name: Container Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'infra/containers/**'
      - 'packages/**'
      - 'plugins/**'
      - 'package.json'
      - 'package-lock.json'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registry'
        type: boolean
        default: false

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/rivetos-agent
  DATAHUB_IMAGE: ghcr.io/${{ github.repository_owner }}/rivetos-datahub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [agent, datahub]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.target == 'agent' && env.AGENT_IMAGE || env.DATAHUB_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build agent image
        if: matrix.target == 'agent'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/containers/agent/Dockerfile
          push: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || '0.0.0-dev' }}
            GIT_SHA=${{ github.sha }}

      - name: Build datahub image
        if: matrix.target == 'datahub'
        uses: docker/build-push-action@v6
        with:
          context: infra/containers/datahub
          file: infra/containers/datahub/Dockerfile
          push: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
