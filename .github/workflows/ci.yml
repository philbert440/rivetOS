name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secrets-scan:
    name: Secrets & Private IP Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check for private IPs (non-RFC 5737 examples)
        run: |
          echo "Scanning for private/internal IP addresses in tracked files..."
          echo "Allowed example ranges: 192.168.x.x, 10.0.0.x, 172.16.x.x, 192.0.2.x, 198.51.100.x, 203.0.113.x"
          echo ""

          # Patterns that indicate real infrastructure IPs (not standard example ranges)
          # Look for 10.x.x.x where x > 0 in second octet (10.0.0.x is common example range)
          FOUND=0

          # Check for non-standard 10.x.x.x (anything other than 10.0.0.x which is a common example)
          if git grep -n 'http[s]*://10\.[1-9][0-9]*\.' -- ':!.github/' ':!node_modules/' ':!.nx/' ':!memory/' ':!.secrets/' 2>/dev/null; then
            echo "::error::Found non-example 10.x.x.x IPs (possible infrastructure leak)"
            FOUND=1
          fi

          # Also check for bare IPs in config-like patterns (host: 10.x, ip: 10.x, etc.)
          if git grep -n '[^0-9]10\.[1-9][0-9]*\.[0-9]*\.[0-9]' -- ':!.github/' ':!node_modules/' ':!.nx/' ':!memory/' ':!.secrets/' 2>/dev/null; then
            echo "::error::Found non-example 10.x.x.x IPs (possible infrastructure leak)"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Use 192.168.1.x for examples. See RFC 5737 for documentation ranges."
            exit 1
          fi

          echo "✅ No private IP leaks found"

      - name: Check for API keys and tokens
        run: |
          echo "Scanning for potential API keys and tokens..."
          FOUND=0

          # Common API key patterns (long hex/base64 strings assigned to key-like variables)
          if git grep -nP '(api[_-]?key|secret[_-]?key|token|password)\s*[:=]\s*["\x27][A-Za-z0-9+/=_-]{20,}["\x27]' -- ':!.github/' ':!node_modules/' ':!.nx/' ':!memory/' ':!.secrets/' ':!*.test.ts' ':!*.test.js' 2>/dev/null; then
            echo "::warning::Potential API key/token found — verify these are examples, not real credentials"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "If these are test fixtures, consider using obviously-fake values like 'test-key-xxx'"
            exit 1
          fi

          echo "✅ No API key leaks found"

  ci:
    runs-on: ubuntu-latest
    needs: secrets-scan
    permissions:
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - name: Lint
        run: npx nx affected -t lint --parallel=5

      - name: Build
        run: npx nx affected -t build --parallel=5 --exclude container-agent,container-datahub

      - name: Test
        run: npx nx affected -t test --parallel=5

  notify-ops:
    name: Notify Deploy Pipeline
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Trigger rivetos-ops deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.OPS_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/philbert440/rivetos-ops/dispatches \
            -d '{"event_type":"deploy","client_payload":{"sha":"${{ github.sha }}","ref":"${{ github.ref }}"}}'
