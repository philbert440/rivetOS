name: Publish to npm

# Triggers:
#   - push to main: publishes any package whose version isnt yet on the registry
#                   under the `beta` dist-tag (idempotent — no-op until a bump)
#   - push of v* tag: publishes under `latest` for stable tags (vX.Y.Z),
#                     `beta` for prerelease tags (vX.Y.Z-beta.N)
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx nx run-many -t build --all --parallel=5 --exclude container-agent,container-datahub,site

      - name: Publish changed packages
        run: |
          set -euo pipefail

          # All publishable packages (order matters — dependencies first)
          PACKAGES=(
            packages/types
            packages/core
            packages/boot
            plugins/channels/agent
            plugins/channels/discord
            plugins/channels/telegram
            plugins/channels/voice-discord
            plugins/memory/postgres
            plugins/providers/anthropic
            plugins/providers/claude-cli
            plugins/providers/google
            plugins/providers/llama-server
            plugins/providers/ollama
            plugins/providers/openai-compat
            plugins/providers/xai
            plugins/tools/coding-pipeline
            plugins/tools/file
            plugins/tools/interaction
            plugins/tools/mcp-client
            plugins/tools/search
            plugins/tools/shell
            plugins/tools/web-search
            packages/cli
            packages/nx-plugin
          )

          TAG="beta"
          # Use "latest" for stable releases (non-prerelease tags)
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG="latest"
          fi

          PUBLISHED=0
          SKIPPED=0

          # Note: counters use pre-increment ((++VAR)) on purpose.
          # Under `set -e`, post-increment ((VAR++)) returns the *original*
          # value as the exit code — so the very first ((SKIPPED++)) when
          # SKIPPED=0 returns exit 1 and aborts the loop. Pre-increment
          # returns the new (non-zero) value, which is exit 0.

          for pkg_dir in "${PACKAGES[@]}"; do
            if [ ! -f "$pkg_dir/package.json" ]; then
              echo "⚠️  $pkg_dir/package.json not found, skipping"
              continue
            fi

            PKG_NAME=$(node -p "require('./$pkg_dir/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg_dir/package.json').version")
            IS_PRIVATE=$(node -p "require('./$pkg_dir/package.json').private || false")

            if [ "$IS_PRIVATE" = "true" ]; then
              echo "⏭️  $PKG_NAME is private, skipping"
              ((++SKIPPED))
              continue
            fi

            # Check if this version already exists on the registry
            EXISTING=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
            if [ "$EXISTING" = "$PKG_VERSION" ]; then
              echo "⏭️  $PKG_NAME@$PKG_VERSION already published"
              ((++SKIPPED))
              continue
            fi

            echo "📦 Publishing $PKG_NAME@$PKG_VERSION (tag: $TAG)..."
            (cd "$pkg_dir" && npm publish --tag "$TAG" --access public --provenance)
            ((++PUBLISHED))
          done

          echo ""
          echo "✅ Published: $PUBLISHED | Skipped: $SKIPPED"
