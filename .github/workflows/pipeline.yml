name: Pipeline

# Single orchestrator: secrets-scan → ci → (publish-npm, containers) → notify-ops
#
# PRs run lint/test/build via `nx affected` for speed.
# main / v* tags run `run-many --all` deterministically, then publish npm
# packages and container images in parallel, and notify rivetos-ops only
# after both publish jobs complete (so deploys never race the registry).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  # Cancel superseded runs on PRs only. Never cancel main/tag runs — a
  # cancelled publish-npm or notify-ops can leave the registry and the
  # deploy pipeline out of sync.
  group: pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secrets-scan:
    name: Secrets & Private IP Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for private IPs (non-RFC 5737 examples)
        run: |
          echo "Scanning for private/internal IP addresses in tracked files..."
          echo "Allowed example ranges: 192.168.x.x, 10.0.0.x, 172.16.x.x, 192.0.2.x, 198.51.100.x, 203.0.113.x"
          echo ""

          FOUND=0

          if git grep -n 'http[s]*://10\.[1-9][0-9]*\.' -- ':!.github/' ':!node_modules/' ':!.nx/' ':!memory/' ':!.secrets/' 2>/dev/null; then
            echo "::error::Found non-example 10.x.x.x IPs (possible infrastructure leak)"
            FOUND=1
          fi

          if git grep -n '[^0-9]10\.[1-9][0-9]*\.[0-9]*\.[0-9]' -- ':!.github/' ':!node_modules/' ':!.nx/' ':!memory/' ':!.secrets/' 2>/dev/null; then
            echo "::error::Found non-example 10.x.x.x IPs (possible infrastructure leak)"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Use 192.168.1.x for examples. See RFC 5737 for documentation ranges."
            exit 1
          fi

          echo "✅ No private IP leaks found"

      - name: Check for API keys and tokens
        run: |
          echo "Scanning for potential API keys and tokens..."
          FOUND=0

          if git grep -nP '(api[_-]?key|secret[_-]?key|token|password)\s*[:=]\s*["\x27][A-Za-z0-9+/=_-]{20,}["\x27]' -- ':!.github/' ':!node_modules/' ':!.nx/' ':!memory/' ':!.secrets/' ':!*.test.ts' ':!*.test.js' 2>/dev/null; then
            echo "::warning::Potential API key/token found — verify these are examples, not real credentials"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "If these are test fixtures, consider using obviously-fake values like 'test-key-xxx'"
            exit 1
          fi

          echo "✅ No API key leaks found"

  ci:
    # Check name is `ci` (default from job id) to satisfy the
    # `ci` required status check in branch protection on main.
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - name: Lint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t lint --parallel=5
          else
            npx nx run-many -t lint --all --parallel=5
          fi

      - name: Test
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t test --parallel=5
          else
            npx nx run-many -t test --all --parallel=5
          fi

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t build --parallel=5 --exclude container-agent,container-datahub,container-rivetos,site
          else
            npx nx run-many -t build --all --parallel=5 --exclude container-agent,container-datahub,container-rivetos,site
          fi

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx nx run-many -t build --all --parallel=5 --exclude container-agent,container-datahub,container-rivetos,site

      - name: Publish changed packages
        run: |
          set -euo pipefail

          # All publishable packages (order matters — dependencies first)
          PACKAGES=(
            packages/types
            packages/core
            packages/boot
            plugins/channels/agent
            plugins/channels/discord
            plugins/channels/telegram
            plugins/channels/voice-discord
            plugins/memory/postgres
            plugins/providers/anthropic
            plugins/providers/claude-cli
            plugins/providers/google
            plugins/providers/llama-server
            plugins/providers/ollama
            plugins/providers/openai-compat
            plugins/providers/xai
            plugins/tools/coding-pipeline
            plugins/tools/file
            plugins/tools/interaction
            plugins/tools/mcp-client
            plugins/tools/search
            plugins/tools/shell
            plugins/tools/web-search
            plugins/transports/mcp-server
            packages/cli
            packages/nx-plugin
          )

          TAG="beta"
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG="latest"
          fi

          PUBLISHED=0
          SKIPPED=0

          # Pre-increment ((++VAR)) is intentional: under `set -e`,
          # post-increment ((VAR++)) returns the original value as the
          # exit code, so the first ((SKIPPED++)) when SKIPPED=0 aborts.
          for pkg_dir in "${PACKAGES[@]}"; do
            if [ ! -f "$pkg_dir/package.json" ]; then
              echo "⚠️  $pkg_dir/package.json not found, skipping"
              continue
            fi

            PKG_NAME=$(node -p "require('./$pkg_dir/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg_dir/package.json').version")
            IS_PRIVATE=$(node -p "require('./$pkg_dir/package.json').private || false")

            if [ "$IS_PRIVATE" = "true" ]; then
              echo "⏭️  $PKG_NAME is private, skipping"
              ((++SKIPPED))
              continue
            fi

            EXISTING=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
            if [ "$EXISTING" = "$PKG_VERSION" ]; then
              echo "⏭️  $PKG_NAME@$PKG_VERSION already published"
              ((++SKIPPED))
              continue
            fi

            echo "📦 Publishing $PKG_NAME@$PKG_VERSION (tag: $TAG)..."
            (cd "$pkg_dir" && npm publish --tag "$TAG" --access public --provenance)
            ((++PUBLISHED))
          done

          echo ""
          echo "✅ Published: $PUBLISHED | Skipped: $SKIPPED"

  containers:
    name: Build & push container images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [agent, datahub, rivetos]

    env:
      REGISTRY: ghcr.io
      AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/rivetos-agent
      DATAHUB_IMAGE: ghcr.io/${{ github.repository_owner }}/rivetos-datahub
      RIVETOS_IMAGE: ghcr.io/${{ github.repository_owner }}/rivetos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.target == 'agent' && env.AGENT_IMAGE || matrix.target == 'datahub' && env.DATAHUB_IMAGE || env.RIVETOS_IMAGE }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build agent image
        if: matrix.target == 'agent'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/containers/agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}
            GIT_SHA=${{ github.sha }}

      - name: Build datahub image
        if: matrix.target == 'datahub'
        uses: docker/build-push-action@v6
        with:
          # Repo-root context — Dockerfile copies deploy/schema/migrations.
          context: .
          file: infra/containers/datahub/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build rivetos unified image
        if: matrix.target == 'rivetos'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/containers/rivetos/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}
            GIT_SHA=${{ github.sha }}

  notify-ops:
    name: Notify Deploy Pipeline
    runs-on: ubuntu-latest
    needs: [publish-npm, containers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger rivetos-ops deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.OPS_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/philbert440/rivetos-ops/dispatches \
            -d '{"event_type":"deploy","client_payload":{"sha":"${{ github.sha }}","ref":"${{ github.ref }}"}}'
